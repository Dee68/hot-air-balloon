    <!-- enables scroll back to top -->
     <a href="#" id="off"></a>
     <!-- contact form & details -->
     <section id="contact-page">
        <div id="contact-form">
            <form action="https://httpbin.org/post" method="post">
                <label for="name">Name:</label>
                <br>
                <input type="text" name="name" id="name" class="text-input" required="">
                <br>
                <label for="phone">Telephone:</label>
                <br>
                <input type="tel" name="phone" id="phone" class="text-input" required="">
                <br>
                <label for="email">Email:</label>
                <br>
                <input type="email" name="email" id="email" class="text-input" required="">
                <br>
                <label for="message">Message:</label>
                <br>
                <textarea name="message" id="message" cols="30" rows="10" required=""></textarea>
                <br>
                <input type="submit" value="Send" class="btn">
            </form>
        </div>
        <div id="contact">
            <h2>Contact us</h2>
            <p>Want to connect with Kerry Balloons? Please use the contact form, or contact us by phone</p>
            <p><i class="fas fa-envelope" aria-hidden="true"></i>KerryBalloons@gmail.com</p>
            <p><i class="fas fa-mobile-alt" aria-hidden="true"></i>0-87-785-0472</p>
            <p><i class="fas fa-home" aria-hidden="true"></i> Skellig Accommodation Center,V23 H729</p>
        </div>
     </section>
     <!-- google map of location -->

        </div>
      </section>
